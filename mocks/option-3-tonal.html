<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Procedure Library — Tonal calm</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1E1D1D; --muted:#5F626C; --faint:#6B6E7C;
    --paper:#F3F3F3; --surface:#FFFFFF;
    --line:rgba(30,29,29,.12); --line-2:rgba(30,29,29,.24);
    --accent:#508875; --accent-mid:#70A593; --accent-soft:#9CC9BB; --accent-wash:#EAF2EE;
    --fg:#18181B; --muted-fg:#71717A; --border:#E4E4E7;
    --card:#FFFFFF; --canvas:#F8F8F8;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--paper);color:var(--ink)}
  body{
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    padding:56px 32px 80px;
  }
  .wrap{max-width:1240px;margin:0 auto}

  /* ---------- marketing header (DM Sans + JetBrains Mono only) ---------- */
  .mkt{margin:0 4px 26px}
  .eyebrow{
    font-family:'JetBrains Mono',monospace;font-weight:500;
    font-size:12px;letter-spacing:.06em;color:var(--accent);
    display:inline-flex;align-items:center;gap:8px;margin-bottom:14px;
  }
  .eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--accent-mid)}
  .eyebrow .word{color:var(--faint)}
  .mkt h1{
    font-family:'DM Sans',sans-serif;font-weight:600;
    font-size:28px;line-height:1.18;letter-spacing:-.012em;color:var(--ink);
  }
  .mkt .sub{
    font-family:'DM Sans',sans-serif;font-weight:400;
    font-size:15px;color:var(--muted);margin-top:8px;max-width:540px;line-height:1.5;
  }

  /* ---------- the tool: rounded plane, barely-there border ---------- */
  .tool{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:14px;
    overflow:hidden;
    display:grid;
    grid-template-columns:228px minmax(0,1fr) 1fr;
    min-height:620px;
  }

  /* tonal planes — no dividers between, just fills */
  .col{padding:22px 8px}
  .roles{background:var(--canvas)}
  .list{background:var(--card)}
  .preview{background:var(--canvas)}

  .col-label{
    font-family:'Inter',sans-serif;font-size:11px;font-weight:600;
    letter-spacing:.07em;text-transform:uppercase;color:var(--muted-fg);
    padding:0 16px;margin-bottom:14px;
  }

  /* ---------- roles column ---------- */
  .roles .col{padding:22px 12px}
  .role{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:9px 14px;border-radius:9px;cursor:pointer;
    font-size:13.5px;color:var(--fg);position:relative;
    transition:background .14s ease,color .14s ease;
  }
  .role .nm{font-weight:450}
  .role .ct{
    font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;
    font-size:12px;color:var(--muted-fg);font-feature-settings:"tnum";
  }
  .role:hover{background:rgba(30,29,29,.035)}
  .role.active{background:var(--accent-wash)}
  .role.active .nm{font-weight:600;color:#2f5346}
  .role.active .ct{color:var(--accent)}
  .role.active::before{
    content:"";position:absolute;left:4px;top:50%;transform:translateY(-50%);
    width:3px;height:18px;border-radius:2px;background:var(--accent);
  }
  .role-sep{height:1px;background:var(--line);margin:10px 16px 12px}

  /* ---------- procedure list ---------- */
  .list .col{padding:22px 10px}
  .rows{display:flex;flex-direction:column}
  .row{
    display:grid;grid-template-columns:30px 1fr auto;align-items:center;gap:12px;
    padding:11px 14px;cursor:pointer;border-radius:9px;position:relative;
    transition:background .14s ease;
  }
  .row + .row{box-shadow:0 -1px 0 var(--line)}
  .row:hover{background:rgba(30,29,29,.032)}
  .row .ix{
    font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:400;
    color:var(--muted-fg);letter-spacing:.02em;
  }
  .row .ttl{font-size:13.5px;color:var(--fg);line-height:1.35;font-weight:450}
  .row .pg{
    font-family:'JetBrains Mono',monospace;font-size:12px;
    color:var(--muted-fg);font-variant-numeric:tabular-nums;white-space:nowrap;
  }
  .row.is-ref .ttl{color:#8a8c93}
  .row .refcue{
    font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#9a9ca3;
    margin-left:8px;letter-spacing:.02em;vertical-align:1px;
  }
  .row.active{background:var(--accent-wash)}
  .row.active .ttl{color:#2f5346;font-weight:500}
  .row.active .ix{color:var(--accent-mid)}
  .row.active .pg{color:var(--accent)}
  .row.active::before{
    content:"";position:absolute;left:3px;top:9px;bottom:9px;
    width:3px;border-radius:2px;background:var(--accent);
  }
  .row + .row.active{box-shadow:none}
  .row.active + .row{box-shadow:none}
  .empty{padding:30px 18px;font-size:13px;color:var(--muted-fg)}

  /* ---------- preview ---------- */
  .preview .col{padding:30px 30px}
  .pv-sec{
    font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:500;
    letter-spacing:.10em;color:var(--accent);margin-bottom:12px;
  }
  .pv-title{font-size:20px;font-weight:600;color:var(--fg);line-height:1.25;letter-spacing:-.01em}
  .pv-attr{
    font-size:12.5px;color:var(--muted-fg);margin-top:10px;
    font-variant-numeric:tabular-nums;
  }
  .pv-attr .sep{color:var(--border);margin:0 7px}
  .pv-steps{margin-top:26px;list-style:none}
  .pv-steps li{
    display:grid;grid-template-columns:26px 1fr;gap:14px;align-items:start;
    padding:13px 2px;font-size:13.5px;color:var(--fg);line-height:1.5;
  }
  .pv-steps li + li{box-shadow:0 -1px 0 var(--line)}
  .pv-steps .n{
    font-family:'JetBrains Mono',monospace;font-size:12px;
    color:var(--accent-mid);font-variant-numeric:tabular-nums;padding-top:1px;
  }
  .pv-note{
    margin-top:22px;font-size:13px;color:var(--muted);line-height:1.55;
    background:var(--surface);border-radius:10px;padding:16px 18px;
    border:1px solid var(--line);
  }
  .pv-note .pg{
    font-family:'JetBrains Mono',monospace;color:var(--faint);
    font-variant-numeric:tabular-nums;
  }
  @media (max-width:1180px){
    .tool{grid-template-columns:200px minmax(0,1fr) 1fr}
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="mkt">
    <div class="eyebrow"><span class="dot"></span>Procedure Library<span class="word">· Receiving SOP</span></div>
    <h1>Pick a role. See only its procedures.</h1>
    <p class="sub">Twenty-eight work instructions from your Receiving SOP, filtered by job function and previewed as clean, numbered steps.</p>
  </header>

  <main class="tool">
    <section class="roles">
      <div class="col">
        <div class="col-label">Job functions</div>
        <div id="roleList"></div>
      </div>
    </section>

    <section class="list">
      <div class="col">
        <div class="col-label">Procedures</div>
        <div class="rows" id="rowList"></div>
      </div>
    </section>

    <section class="preview">
      <div class="col" id="preview"></div>
    </section>
  </main>

</div>

<script>
const ROLES = [
  {key:'all',   label:'All',            count:28},
  {key:'unloader', label:'Unloader',    count:11},
  {key:'receiver', label:'Receiver',    count:4},
  {key:'oc',    label:'Ops Coordinator',count:1},
  {key:'exc',   label:'Exceptions Clerk',count:1},
  {key:'am',    label:'AM / Coordinator',count:1},
  {key:'shared',label:'Shared / All',   count:10},
];

const SECTIONS = [
  ['A','Overview, Definitions & Core Roles','shared','ref','4-6'],
  ['B','Equipment (+ equipment × role matrix)','shared','ref','7-10'],
  ['C','Layout — hand / fork / clamp setups','shared','ref','11-12'],
  ['D','Safety Practices','shared','ref','13-17'],
  ['E','Roles & ABC Assignment','shared','ref','18-19'],
  ['F',"Manager's Plan",'am','proc','20-21'],
  ['G','Shift Start Up','shared','proc','22'],
  ['H','View & Print ASN','oc','proc','23-24'],
  ['I','Operating Dock Locks','unloader','proc','25'],
  ['J','Inspect the Trailer / Container','unloader','proc','26'],
  ['K','TI-HI, Build & Secure a Pallet','unloader','proc','27-35'],
  ['L','SKUs with FIFO Labeling Requirement','receiver','proc','36-38'],
  ['M','Unloading International Freight','unloader','proc','39-48'],
  ['N','Handling Wooden Crates','unloader','proc','49-50'],
  ['O','Hand Unloading Configuration','unloader','proc','51-52'],
  ['P','Conveyor Unload','unloader','proc','53-61'],
  ['Q','Forklift Unloading Configuration','unloader','proc','62-64'],
  ['R','Clamp Unloading','unloader','proc','65-76'],
  ['S','Smart Unloading Configuration','unloader','proc','77-79'],
  ['T','Receive/Verify ASN — International','receiver','proc','80-89'],
  ['U','Unloading Domestic Freight','receiver','proc','90-92'],
  ['V','Receive/Verify ASN — Domestic','receiver','proc','93-96'],
  ['W','End of Unloading Trailer Process','unloader','proc','97'],
  ['X','Exceptions (10 flows incl. hazmat)','exc','proc','98-117'],
  ['Y','Process Flow Diagrams','shared','ref','118'],
  ['Z','DC Best Practices','shared','ref','119'],
  ['AA','End of Shift','shared','proc','120'],
  ['BB','Revision Notes','shared','ref','121'],
];

const ROLE_LABEL = {};
ROLES.forEach(r=>ROLE_LABEL[r.key]=r.label);

const STEPS = {
  T:[
    'Obtain the ASN Control Log (ASN#, Door#, Container#, TI-HI, inner pack).',
    'Walk to the door number on the log.',
    'Verify the pallet plaque matches the ASN number.',
    'Check the ASN SKU matches the assigned container.',
    'Count offloaded pallets; record on the tally sheet.',
    'Verify TI-HI against the ASN for each SKU.',
    'Check the PO number printed on the carton.',
    'Count boxes per pallet × units per box.',
    'Calculate total units and verify against the ASN Report.',
    'RF Gladiator: log in to WMOS → Receiving → Recv Item Lvl-HFT.',
    'Enter dock door, scan ASN, scan iLPN, verify pack qty, enter qty.',
    'Place the iLPN bottom-right on the pallet; repeat per SKU.',
    'Tally total units and write beside “Received”.',
    'Close the load at a workstation.',
  ],
  L:[
    'Open the DC FIFO Shelf Life Labeling SKUs spreadsheet.',
    'Obtain the PO / packing slip for the freight.',
    'Check whether each SKU is listed in the FIFO spreadsheet.',
    'Determine master-only vs master+inner (yellow = master+inner, blue = master only).',
    'Use the year’s color sticker.',
    'OC notifies the Receiver of inbound SKUs needing stickers.',
    'Locate the staged item; get stickers + an empty pallet.',
    'Master pack: label top outside of case; stack per TI-HI.',
    'Master+inner: label master, label inner, replace, re-label master.',
    'Receive the item into WMOS.',
  ],
  V:[
    'Obtain the signed BOL + a blank ASN Control Log.',
    'Tally case & unit counts per SKU onto the log.',
    'Match physical counts to the BOL.',
    'If no BOL, pull PO details from WMOS.',
    'Log in to WMOS at the nearest workstation.',
    'Create an ASN from PO (domestic ASN# begin with “D”).',
    'Set Shipped Qty, Save → ASN goes In-Transit.',
    'Print the ASN.',
    'Receive the shipment per the Section T flow.',
  ],
};

let activeRole = 'all';
let activeLetter = 'T';

const roleListEl = document.getElementById('roleList');
const rowListEl  = document.getElementById('rowList');
const previewEl  = document.getElementById('preview');

function renderRoles(){
  roleListEl.innerHTML = '';
  ROLES.forEach((r,i)=>{
    if(i===1){
      const sep = document.createElement('div');
      sep.className='role-sep';
      roleListEl.appendChild(sep);
    }
    const el = document.createElement('div');
    el.className = 'role' + (r.key===activeRole?' active':'');
    el.innerHTML = `<span class="nm">${r.label}</span><span class="ct">${r.count}</span>`;
    el.addEventListener('click',()=>{ activeRole=r.key; renderRoles(); renderRows(); });
    roleListEl.appendChild(el);
  });
}

function visibleSections(){
  if(activeRole==='all') return SECTIONS;
  return SECTIONS.filter(s=>s[2]===activeRole);
}

function renderRows(){
  rowListEl.innerHTML='';
  const items = visibleSections();
  if(items.length===0){
    rowListEl.innerHTML = '<div class="empty">No procedures for this role.</div>';
    return;
  }
  let stillActive = false;
  items.forEach(s=>{
    const [letter,title,role,type,pages]=s;
    if(letter===activeLetter) stillActive=true;
    const el=document.createElement('div');
    el.className='row'+(type==='ref'?' is-ref':'')+(letter===activeLetter?' active':'');
    const ref = type==='ref' ? '<span class="refcue">Reference</span>' : '';
    el.innerHTML =
      `<span class="ix">${letter}</span>`+
      `<span class="ttl">${title}${ref}</span>`+
      `<span class="pg">${pages}</span>`;
    el.addEventListener('click',()=>{ activeLetter=letter; renderRows(); renderPreview(); });
    rowListEl.appendChild(el);
  });
  if(!stillActive && items.length){
    activeLetter = items[0][0];
    renderRows();
    renderPreview();
  }
}

function renderPreview(){
  const s = SECTIONS.find(x=>x[0]===activeLetter);
  if(!s){ previewEl.innerHTML=''; return; }
  const [letter,title,role,type,pages]=s;
  const typeLabel = type==='ref' ? 'Reference' : 'Procedure';
  const attr = `${ROLE_LABEL[role]}<span class="sep">·</span>pp. ${pages}<span class="sep">·</span>${typeLabel}`;
  let body;
  if(STEPS[letter]){
    const steps = STEPS[letter].map((t,i)=>
      `<li><span class="n">${String(i+1).padStart(2,'0')}</span><span>${t}</span></li>`).join('');
    body = `<ol class="pv-steps">${steps}</ol>`;
  }else{
    body = `<div class="pv-note">Work instruction prepared from your SOP.<br>`+
           `Section ${letter} · pages <span class="pg">${pages}</span>.</div>`;
  }
  previewEl.innerHTML =
    `<div class="pv-sec">SECTION ${letter}</div>`+
    `<div class="pv-title">${title}</div>`+
    `<div class="pv-attr">${attr}</div>`+
    body;
}

renderRoles();
renderRows();
renderPreview();
</script>
</body>
</html>
